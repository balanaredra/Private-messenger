<!DOCTYPE html>
<html>
<head>
  <title>Private Messenger</title>
  <style>
    body { font-family: Arial; text-align: center; }
    #chat { width: 300px; margin: auto; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
    input, button { padding: 10px; margin-top: 5px; }
  </style>
</head>

<body>

<h2>Private Messenger</h2>

<div id="chat">
  <input id="username" placeholder="Enter your name"><br>
  <div id="messages"></div>

  <input id="messageInput" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔴 Replace with your Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const messagesDiv = document.getElementById("messages");

// Listen for messages (real-time)
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  messagesDiv.innerHTML = "";
  snapshot.forEach(doc => {
    const data = doc.data();
    messagesDiv.innerHTML += `<p><b>${data.user}:</b> ${data.text}</p>`;
  });
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

// Send message
window.sendMessage = async function() {
  const user = document.getElementById("username").value;
  const text = document.getElementById("messageInput").value;

  if (!user || !text) return alert("Enter name & message");

  await addDoc(collection(db, "messages"), {
    user: user,
    text: text,
    time: Date.now()
  });

  document.getElementById("messageInput").value = "";
};
</script>

</body>
</html>
